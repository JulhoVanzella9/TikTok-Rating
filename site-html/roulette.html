<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Rating - Roleta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(0,0,0,0.5);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .super-vip {
            color: #ff2d55;
            font-weight: bold;
            font-size: 14px;
        }

        .balance {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border: 1px solid #ff2d55;
            border-radius: 20px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-icon {
            width: 20px;
            height: 20px;
            background: #ff2d55;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .balance-amount {
            color: #00f5d4;
            font-weight: bold;
            font-size: 16px;
        }

        .main-content {
            padding-top: 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .info-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border: 1px solid #3a3a5a;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .info-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00f5d4 0%, #ff2d55 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .info-title {
            font-size: 18px;
            font-weight: bold;
        }

        .info-subtitle {
            font-size: 14px;
            color: #888;
        }

        .stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #888;
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats .highlight {
            color: #00f5d4;
        }

        .result-card {
            background: linear-gradient(135deg, #2a1a2a 0%, #1a0d1a 100%);
            border: 2px solid #ff2d55;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-bottom: 20px;
        }

        .result-card.success {
            border-color: #00f5d4;
            background: linear-gradient(135deg, #1a2a2a 0%, #0d1a1a 100%);
        }

        .result-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .result-subtitle {
            font-size: 14px;
            color: #888;
        }

        .result-highlight {
            color: #00f5d4;
            font-size: 20px;
            font-weight: bold;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px 0;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 40px rgba(0, 245, 212, 0.3), 0 0 80px rgba(255, 45, 85, 0.2);
        }

        .wheel-segment {
            position: absolute;
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%, 100% 50%);
            transform-origin: center;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a1a 100%);
            border-radius: 50%;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-size: 24px;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff2d55;
            z-index: 20;
            filter: drop-shadow(0 0 10px rgba(255, 45, 85, 0.5));
        }

        .spin-btn {
            background: linear-gradient(135deg, #ff2d55 0%, #ff6b8a 100%);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px 60px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.5);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .spin-btn.success {
            background: linear-gradient(135deg, #00f5d4 0%, #00d4aa 100%);
            color: #000;
        }

        .hidden {
            display: none !important;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 400;
        }

        /* SVG Wheel */
        .wheel svg {
            width: 100%;
            height: 100%;
        }

        .wheel-text {
            font-weight: bold;
            font-size: 24px;
            fill: white;
        }
    </style>
</head>
<body>
    <header class="header">
        <span class="super-vip">SUPER VIP</span>
        <div class="balance">
            <div class="balance-icon">💰</div>
            <span class="balance-amount" id="balance">$0.00</span>
        </div>
    </header>

    <main class="main-content">
        <div class="info-card">
            <div class="info-header">
                <div class="info-icon">⚡</div>
                <div>
                    <div class="info-title">💵 Multiply your balance!</div>
                    <div class="info-subtitle">Spin the wheel and triple your earnings before withdrawing!</div>
                </div>
            </div>
            <div class="stats">
                <span>👥 <span id="online-count">2,811</span> online</span>
                <span class="highlight">⏰ Only 20 spots today</span>
            </div>
        </div>

        <div class="result-card" id="result-card">
            <div class="result-icon" id="result-icon">❌</div>
            <div class="result-title" id="result-title">Almost! Only 2x this time</div>
            <div class="result-subtitle" id="result-subtitle">But don't give up...</div>
        </div>

        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <div class="wheel" id="wheel">
                <svg viewBox="0 0 200 200">
                    <!-- Segment 1 - 3x (0-60 degrees) -->
                    <path d="M100,100 L100,0 A100,100 0 0,1 186.6,50 Z" fill="#ff2d55"/>
                    <text x="130" y="40" class="wheel-text" transform="rotate(30, 100, 100)">3x</text>
                    
                    <!-- Segment 2 - 2x (60-120 degrees) -->
                    <path d="M100,100 L186.6,50 A100,100 0 0,1 186.6,150 Z" fill="#00f5d4"/>
                    <text x="160" y="100" class="wheel-text" transform="rotate(90, 100, 100)">2x</text>
                    
                    <!-- Segment 3 - 3x (120-180 degrees) -->
                    <path d="M100,100 L186.6,150 A100,100 0 0,1 100,200 Z" fill="#ff2d55"/>
                    <text x="130" y="160" class="wheel-text" transform="rotate(150, 100, 100)">3x</text>
                    
                    <!-- Segment 4 - 2x (180-240 degrees) -->
                    <path d="M100,100 L100,200 A100,100 0 0,1 13.4,150 Z" fill="#00f5d4"/>
                    <text x="70" y="160" class="wheel-text" transform="rotate(210, 100, 100)">2x</text>
                    
                    <!-- Segment 5 - 3x (240-300 degrees) -->
                    <path d="M100,100 L13.4,150 A100,100 0 0,1 13.4,50 Z" fill="#ff2d55"/>
                    <text x="40" y="100" class="wheel-text" transform="rotate(270, 100, 100)">3x</text>
                    
                    <!-- Segment 6 - 2x (300-360 degrees) -->
                    <path d="M100,100 L13.4,50 A100,100 0 0,1 100,0 Z" fill="#00f5d4"/>
                    <text x="70" y="40" class="wheel-text" transform="rotate(330, 100, 100)">2x</text>
                </svg>
            </div>
            <div class="wheel-center">🎰</div>
        </div>

        <button class="spin-btn" id="spin-btn">GIRAR A ROLETA 🎲</button>
    </main>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        // State
        let balance = parseFloat(localStorage.getItem('tiktok-balance')) || 28.50;
        let spinCount = 0;
        let isSpinning = false;

        document.getElementById('balance').textContent = `$${balance.toFixed(2)}`;
        document.getElementById('result-card').classList.add('hidden');

        // Audio Context for sounds
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playSpinSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 200;
            oscillator.type = 'sawtooth';
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            
            // Tick sounds
            for (let i = 0; i < 20; i++) {
                const t = audioCtx.currentTime + i * 0.2;
                oscillator.frequency.setValueAtTime(300 + Math.random() * 200, t);
            }
            
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 4);
        }

        function playCelebrationSound() {
            initAudio();
            const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
            notes.forEach((freq, i) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.4);
                oscillator.start(audioCtx.currentTime + i * 0.1);
                oscillator.stop(audioCtx.currentTime + i * 0.1 + 0.4);
            });
        }

        // Confetti
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let confettiPieces = [];

        function createConfetti() {
            confettiPieces = [];
            const colors = ['#ff2d55', '#00f5d4', '#ffcc00', '#ff6b8a', '#00d4aa', '#ff9500'];
            for (let i = 0; i < 200; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 12 + 5,
                    h: Math.random() * 8 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    velocity: Math.random() * 4 + 3,
                    angle: Math.random() * Math.PI * 2,
                    spin: Math.random() * 0.3 - 0.15
                });
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let activeConfetti = false;
            
            confettiPieces.forEach(piece => {
                if (piece.y < canvas.height) {
                    activeConfetti = true;
                    piece.y += piece.velocity;
                    piece.angle += piece.spin;
                    
                    ctx.save();
                    ctx.translate(piece.x, piece.y);
                    ctx.rotate(piece.angle);
                    ctx.fillStyle = piece.color;
                    ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
                    ctx.restore();
                }
            });

            if (activeConfetti) {
                requestAnimationFrame(animateConfetti);
            }
        }

        function triggerConfetti() {
            createConfetti();
            animateConfetti();
            playCelebrationSound();
        }

        // Spin Logic
        function spinWheel() {
            if (isSpinning) return;
            
            isSpinning = true;
            spinCount++;
            
            const wheel = document.getElementById('wheel');
            const resultCard = document.getElementById('result-card');
            const spinBtn = document.getElementById('spin-btn');
            
            spinBtn.disabled = true;
            playSpinSound();
            
            // Calculate spin
            let extraRotation;
            let result;
            
            if (spinCount === 1) {
                // First spin - land on 2x
                extraRotation = 360 * 5 + 90; // Land on 2x segment
                result = '2x';
            } else {
                // Second spin - land on 3x
                extraRotation = 360 * 6 + 30; // Land on 3x segment
                result = '3x';
            }
            
            wheel.style.transform = `rotate(${extraRotation}deg)`;
            
            setTimeout(() => {
                resultCard.classList.remove('hidden');
                
                if (result === '2x') {
                    resultCard.classList.remove('success');
                    document.getElementById('result-icon').textContent = '❌';
                    document.getElementById('result-title').textContent = "Almost! Only 2x this time";
                    document.getElementById('result-subtitle').textContent = "But don't give up...";
                    
                    spinBtn.disabled = false;
                    spinBtn.textContent = 'TENTAR NOVAMENTE 🎲';
                } else {
                    resultCard.classList.add('success');
                    document.getElementById('result-icon').textContent = '🎉';
                    document.getElementById('result-title').textContent = "You got the 3x multiplier!";
                    document.getElementById('result-subtitle').innerHTML = '<span class="result-highlight">Your balance will be TRIPLED!</span><br>Click below to continue';
                    
                    // Triple the balance
                    balance = balance * 3;
                    document.getElementById('balance').textContent = `$${balance.toFixed(2)}`;
                    localStorage.setItem('tiktok-balance', balance);
                    
                    triggerConfetti();
                    
                    spinBtn.textContent = 'TRIPLE & CONTINUE 🚀';
                    spinBtn.classList.add('success');
                    spinBtn.disabled = false;
                    spinBtn.onclick = () => {
                        window.location.href = 'vsl.html';
                    };
                }
                
                isSpinning = false;
            }, 4000);
        }

        // Event Listeners
        document.getElementById('spin-btn').addEventListener('click', spinWheel);
        document.body.addEventListener('click', initAudio, { once: true });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Randomize online count
        function updateOnlineCount() {
            const count = 2800 + Math.floor(Math.random() * 100);
            document.getElementById('online-count').textContent = count.toLocaleString();
        }
        setInterval(updateOnlineCount, 5000);
    </script>
</body>
</html>
