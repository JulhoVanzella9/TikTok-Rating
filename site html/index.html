<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Rating - Avalie Videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 430px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .super-vip {
            color: #ff2d55;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        .balance-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #ff2d55;
            border-radius: 20px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .balance-icon {
            font-size: 16px;
        }
        
        .balance-amount {
            color: #00f5d4;
            font-weight: bold;
            font-size: 16px;
        }
        
        /* Timer */
        .timer-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .timer-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .timer {
            font-size: 32px;
            font-weight: bold;
            color: #ff2d55;
        }
        
        /* Progress */
        .progress-section {
            margin-bottom: 20px;
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff2d55, #00f5d4);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        /* Video Section */
        .video-section {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 9/16;
            max-height: 400px;
            background: #000;
        }
        
        .video-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .watch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        .watch-overlay.hidden {
            display: none;
        }
        
        .circular-timer {
            width: 120px;
            height: 120px;
            position: relative;
        }
        
        .circular-timer svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }
        
        .circular-timer .bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 8;
        }
        
        .circular-timer .progress {
            fill: none;
            stroke: url(#timerGradient);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 339.292;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }
        
        .timer-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: white;
        }
        
        .watch-text {
            margin-top: 15px;
            font-size: 14px;
            color: white;
        }
        
        /* Start Button */
        .start-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #ff2d55, #ff6b81);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 16px 60px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(255, 45, 85, 0.4);
        }
        
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(255, 45, 85, 0.6);
        }
        
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* User Notification Popup */
        .user-notification {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(30, 30, 50, 0.95);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(-150%);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .user-notification.show {
            transform: translateX(0);
        }
        
        .notification-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f5d4, #00d4aa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-name {
            font-weight: bold;
            font-size: 14px;
        }
        
        .notification-location {
            font-size: 11px;
            color: #888;
        }
        
        .notification-amount {
            color: #00f5d4;
            font-weight: bold;
            font-size: 16px;
            background: rgba(0, 245, 212, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
        }
        
        /* Footer */
        .footer-text {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <span class="super-vip">SUPER VIP</span>
            <div class="balance-box">
                <span class="balance-icon">&#128176;</span>
                <span class="balance-amount" id="balanceDisplay">$0.00</span>
            </div>
        </div>
        
        <!-- Timer -->
        <div class="timer-section">
            <div class="timer-label">Tempo restante para avaliar</div>
            <div class="timer" id="mainTimer">05:00</div>
        </div>
        
        <!-- Progress -->
        <div class="progress-section">
            <div class="progress-text">
                <span>Progresso</span>
                <span id="progressText">0/2 videos</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- Video Section -->
        <div class="video-section">
            <img class="video-placeholder" src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400&h=700&fit=crop" alt="Video thumbnail">
            
            <!-- Watch Overlay -->
            <div class="watch-overlay" id="watchOverlay">
                <div class="circular-timer">
                    <svg viewBox="0 0 120 120">
                        <defs>
                            <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#ff2d55"/>
                                <stop offset="100%" style="stop-color:#00f5d4"/>
                            </linearGradient>
                        </defs>
                        <circle class="bg" cx="60" cy="60" r="54"/>
                        <circle class="progress" id="timerProgress" cx="60" cy="60" r="54"/>
                    </svg>
                    <div class="timer-number" id="watchTimerNumber">3</div>
                </div>
                <div class="watch-text">Watch before rating</div>
            </div>
        </div>
        
        <!-- Start Button -->
        <div class="start-section">
            <button class="start-btn" id="startBtn" onclick="startWatching()">
                COMECAR A AVALIAR
            </button>
        </div>
        
        <div class="footer-text">
            Avalie videos e ganhe recompensas
        </div>
    </div>
    
    <!-- User Notification -->
    <div class="user-notification" id="userNotification">
        <div class="notification-avatar">&#127917;</div>
        <div class="notification-content">
            <div class="notification-name" id="notifName">Valentina F.</div>
            <div class="notification-location" id="notifLocation">Phoenix</div>
        </div>
        <div class="notification-amount" id="notifAmount">+$14.42</div>
    </div>
    
    <script>
        // Sound functions using Web Audio API
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            return audioCtx;
        }
        
        function playNotificationSound() {
            const ctx = getAudioContext();
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.frequency.setValueAtTime(800, ctx.currentTime);
            oscillator.frequency.setValueAtTime(1000, ctx.currentTime + 0.1);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
            gainNode.gain.exponentialDecayTo && gainNode.gain.exponentialDecayTo(0.01, ctx.currentTime + 0.3);
            gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
            
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + 0.3);
        }
        
        function playTickSound() {
            const ctx = getAudioContext();
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.frequency.setValueAtTime(600, ctx.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.05, ctx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
            
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + 0.1);
        }
        
        // State
        let balance = parseFloat(localStorage.getItem('tiktokBalance')) || 0;
        let watchTimerInterval = null;
        let mainTimerInterval = null;
        let mainTimeLeft = 300; // 5 minutes in seconds
        
        // Update balance display
        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = '$' + balance.toFixed(2);
            localStorage.setItem('tiktokBalance', balance.toString());
        }
        
        // Main 5-minute timer
        function startMainTimer() {
            mainTimerInterval = setInterval(() => {
                mainTimeLeft--;
                const minutes = Math.floor(mainTimeLeft / 60);
                const seconds = mainTimeLeft % 60;
                document.getElementById('mainTimer').textContent = 
                    String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
                
                if (mainTimeLeft <= 0) {
                    clearInterval(mainTimerInterval);
                }
            }, 1000);
        }
        
        // Watch timer (3 seconds)
        function startWatching() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = 'ASSISTINDO...';
            
            const overlay = document.getElementById('watchOverlay');
            overlay.classList.remove('hidden');
            
            let timeLeft = 3;
            const timerNumber = document.getElementById('watchTimerNumber');
            const timerProgress = document.getElementById('timerProgress');
            const circumference = 2 * Math.PI * 54; // 339.292
            
            timerProgress.style.strokeDashoffset = '0';
            timerNumber.textContent = timeLeft;
            
            watchTimerInterval = setInterval(() => {
                timeLeft--;
                playTickSound();
                
                if (timeLeft >= 0) {
                    timerNumber.textContent = timeLeft;
                    const offset = circumference * (1 - timeLeft / 3);
                    timerProgress.style.strokeDashoffset = offset;
                }
                
                if (timeLeft <= 0) {
                    clearInterval(watchTimerInterval);
                    overlay.classList.add('hidden');
                    // Navigate to rate 1
                    window.location.href = 'rate1.html';
                }
            }, 1000);
        }
        
        // Random user notifications
        const names = [
            { name: 'Valentina F.', location: 'Phoenix' },
            { name: 'Lucas M.', location: 'Miami' },
            { name: 'Sofia R.', location: 'Los Angeles' },
            { name: 'Gabriel S.', location: 'New York' },
            { name: 'Isabella K.', location: 'Chicago' },
            { name: 'Pedro H.', location: 'Houston' },
            { name: 'Ana B.', location: 'Dallas' },
            { name: 'Matheus L.', location: 'Seattle' }
        ];
        
        function showRandomNotification() {
            const user = names[Math.floor(Math.random() * names.length)];
            const amount = (Math.random() * 20 + 5).toFixed(2);
            
            document.getElementById('notifName').textContent = user.name;
            document.getElementById('notifLocation').textContent = user.location;
            document.getElementById('notifAmount').textContent = '+$' + amount;
            
            const notification = document.getElementById('userNotification');
            notification.classList.add('show');
            playNotificationSound();
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateBalance();
            startMainTimer();
            
            // Show notifications every 6-10 seconds
            setInterval(() => {
                showRandomNotification();
            }, Math.random() * 4000 + 6000);
            
            // Show first notification after 3 seconds
            setTimeout(showRandomNotification, 3000);
        });
    </script>
</body>
</html>
