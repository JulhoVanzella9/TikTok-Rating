<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Rating - Avalie e Ganhe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(0,0,0,0.5);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .super-vip {
            color: #ff2d55;
            font-weight: bold;
            font-size: 14px;
        }

        .balance {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border: 1px solid #ff2d55;
            border-radius: 20px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-icon {
            width: 20px;
            height: 20px;
            background: #ff2d55;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .balance-amount {
            color: #00f5d4;
            font-weight: bold;
            font-size: 16px;
        }

        .main-content {
            padding-top: 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-display {
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
            color: #888;
        }

        .timer-display span {
            color: #ff2d55;
            font-weight: bold;
        }

        .video-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9/16;
            background: linear-gradient(180deg, #2a1f1f 0%, #1a1520 100%);
            border-radius: 16px;
            margin: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }

        .watch-timer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .watch-timer-overlay.hidden {
            display: none;
        }

        .circular-timer {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .circular-timer svg {
            transform: rotate(-90deg);
            width: 100px;
            height: 100px;
        }

        .circular-timer circle {
            fill: none;
            stroke-width: 6;
        }

        .circular-timer .bg {
            stroke: #333;
        }

        .circular-timer .progress {
            stroke: url(#gradient);
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: white;
        }

        .watch-text {
            margin-top: 16px;
            font-size: 16px;
            color: #aaa;
        }

        .rating-section {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .rating-title {
            text-align: center;
            margin-bottom: 16px;
            font-size: 18px;
            color: #ccc;
        }

        .rating-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .rating-btn {
            background: linear-gradient(135deg, #1a2a1a 0%, #0d1a0d 100%);
            border: 1px solid #2a3a2a;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .rating-btn:hover {
            transform: scale(1.02);
            border-color: #4a5a4a;
        }

        .rating-btn.viral {
            background: linear-gradient(135deg, #1a2a1a 0%, #0d1a0d 100%);
            border-color: #2a4a2a;
        }

        .rating-btn.top {
            background: linear-gradient(135deg, #2a1a1a 0%, #1a0d0d 100%);
            border-color: #4a2a2a;
        }

        .rating-btn.notbad {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border-color: #3a3a3a;
        }

        .rating-btn.meh {
            background: linear-gradient(135deg, #2a2a1a 0%, #1a1a0d 100%);
            border-color: #4a4a2a;
        }

        .rating-btn.danger {
            background: linear-gradient(135deg, #2a2a1a 0%, #1a1a0d 100%);
            border-color: #4a4a2a;
        }

        .rating-btn.flop {
            background: linear-gradient(135deg, #2a1a1a 0%, #1a0d0d 100%);
            border-color: #4a2a2a;
        }

        .rating-btn .icon {
            font-size: 20px;
            margin-right: 8px;
        }

        .rating-btn .label {
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .rating-btn .description {
            font-size: 12px;
            color: #888;
        }

        .rating-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* User Popup Notification */
        .user-popup {
            position: fixed;
            top: 80px;
            left: 20px;
            right: 20px;
            max-width: 350px;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 200;
            animation: slideIn 0.5s ease;
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .user-popup.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-popup .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00f5d4 0%, #ff2d55 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-popup .info {
            flex: 1;
        }

        .user-popup .name {
            font-weight: bold;
            font-size: 14px;
        }

        .user-popup .location {
            font-size: 12px;
            color: #888;
        }

        .user-popup .earnings {
            color: #00f5d4;
            font-weight: bold;
            font-size: 16px;
        }

        /* Reward Modal */
        .reward-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .reward-modal.show {
            display: flex;
        }

        .reward-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #0a0a1a 100%);
            border: 2px solid #ff2d55;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 350px;
            animation: scaleIn 0.5s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .reward-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff2d55 0%, #ff6b8a 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 30px rgba(255, 45, 85, 0.5);
        }

        .reward-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .reward-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }

        .reward-amount {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #00f5d4 0%, #ff2d55 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .reward-description {
            font-size: 14px;
            color: #ff2d55;
            margin-bottom: 20px;
        }

        .reward-cta {
            font-size: 14px;
            color: #888;
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 400;
        }

        /* Progress bar */
        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: #2a2a2a;
            border-radius: 4px;
            margin: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f5d4, #ff2d55);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }

        .continue-btn {
            background: linear-gradient(135deg, #00f5d4 0%, #00d4aa 100%);
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            display: none;
        }

        .continue-btn.show {
            display: block;
        }

        .continue-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.5);
        }
    </style>
</head>
<body>
    <header class="header">
        <span class="super-vip">SUPER VIP</span>
        <div class="balance">
            <div class="balance-icon">💰</div>
            <span class="balance-amount" id="balance">$0.00</span>
        </div>
    </header>

    <main class="main-content">
        <div class="timer-display">
            Tempo restante: <span id="main-timer">05:00</span>
        </div>

        <div class="progress-text">Avaliação <span id="current-rating">1</span> de 2</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <div class="video-container">
            <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/image-ithNdodgK1lUjjq0DoQ6MvDpWhNzAu.png" alt="Video" class="video-placeholder" id="video-img">
            <div class="watch-timer-overlay" id="watch-overlay">
                <div class="circular-timer">
                    <svg viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#00f5d4"/>
                                <stop offset="100%" stop-color="#ff2d55"/>
                            </linearGradient>
                        </defs>
                        <circle class="bg" cx="50" cy="50" r="45"/>
                        <circle class="progress" id="timer-progress" cx="50" cy="50" r="45"/>
                    </svg>
                    <span class="timer-number" id="watch-timer">3</span>
                </div>
                <p class="watch-text">Watch before rating</p>
            </div>
        </div>

        <section class="rating-section">
            <h2 class="rating-title">Avalie este vídeo</h2>
            <div class="rating-grid" id="rating-grid">
                <button class="rating-btn viral" data-rating="viral" disabled>
                    <div class="label">🚀 VIRAL</div>
                    <div class="description">"It's going to blow up!"</div>
                </button>
                <button class="rating-btn top" data-rating="top" disabled>
                    <div class="label">🔥 TOP</div>
                    <div class="description">"Quality content"</div>
                </button>
                <button class="rating-btn notbad" data-rating="notbad" disabled>
                    <div class="label">👀 NOT BAD</div>
                    <div class="description">"It has potential"</div>
                </button>
                <button class="rating-btn meh" data-rating="meh" disabled>
                    <div class="label">😬 MEH</div>
                    <div class="description">"Not convinced..."</div>
                </button>
                <button class="rating-btn danger" data-rating="danger" disabled>
                    <div class="label">⚠️ DANGER</div>
                    <div class="description">"This won't end well..."</div>
                </button>
                <button class="rating-btn flop" data-rating="flop" disabled>
                    <div class="label">💀 FLOP</div>
                    <div class="description">"Doesn't work at all"</div>
                </button>
            </div>
        </section>

        <button class="continue-btn" id="continue-btn">CONTINUAR</button>
    </main>

    <!-- User Popup -->
    <div class="user-popup" id="user-popup">
        <div class="avatar">🎵</div>
        <div class="info">
            <div class="name" id="popup-name">Valentina F.</div>
            <div class="location" id="popup-location">Phoenix</div>
        </div>
        <div class="earnings" id="popup-earnings">$+14.42</div>
    </div>

    <!-- Reward Modal -->
    <div class="reward-modal" id="reward-modal">
        <div class="reward-content">
            <div class="reward-icon">💰</div>
            <h2 class="reward-title">🎉 Well done! Reward unlocked!</h2>
            <p class="reward-subtitle">You earned:</p>
            <div class="reward-amount" id="reward-amount">+$14.80</div>
            <p class="reward-description">for evaluating this video</p>
            <p class="reward-cta">Keep evaluating to earn more! 🚀</p>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        // State
        let balance = 0;
        let currentRating = 1;
        let totalRatings = 2;
        let mainTimer = 300; // 5 minutes in seconds
        let watchTimer = 3;
        let canRate = false;

        // Audio Context for sounds
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
        }

        function playNotificationSound() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        function playCelebrationSound() {
            initAudio();
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.3);
                oscillator.start(audioCtx.currentTime + i * 0.1);
                oscillator.stop(audioCtx.currentTime + i * 0.1 + 0.3);
            });
        }

        // Confetti
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let confettiPieces = [];

        function createConfetti() {
            confettiPieces = [];
            const colors = ['#ff2d55', '#00f5d4', '#ffcc00', '#ff6b8a', '#00d4aa', '#ff9500'];
            for (let i = 0; i < 150; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    velocity: Math.random() * 3 + 2,
                    angle: Math.random() * Math.PI * 2,
                    spin: Math.random() * 0.2 - 0.1
                });
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let activeConfetti = false;
            
            confettiPieces.forEach(piece => {
                if (piece.y < canvas.height) {
                    activeConfetti = true;
                    piece.y += piece.velocity;
                    piece.angle += piece.spin;
                    
                    ctx.save();
                    ctx.translate(piece.x, piece.y);
                    ctx.rotate(piece.angle);
                    ctx.fillStyle = piece.color;
                    ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
                    ctx.restore();
                }
            });

            if (activeConfetti) {
                requestAnimationFrame(animateConfetti);
            }
        }

        function triggerConfetti() {
            createConfetti();
            animateConfetti();
            playCelebrationSound();
        }

        // Main Timer
        function updateMainTimer() {
            const minutes = Math.floor(mainTimer / 60);
            const seconds = mainTimer % 60;
            document.getElementById('main-timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (mainTimer > 0) {
                mainTimer--;
                setTimeout(updateMainTimer, 1000);
            }
        }

        // Watch Timer
        function startWatchTimer() {
            watchTimer = 3;
            canRate = false;
            document.getElementById('watch-overlay').classList.remove('hidden');
            document.querySelectorAll('.rating-btn').forEach(btn => btn.disabled = true);
            
            const progress = document.getElementById('timer-progress');
            const timerNum = document.getElementById('watch-timer');
            const circumference = 2 * Math.PI * 45;
            
            function tick() {
                timerNum.textContent = watchTimer;
                const offset = circumference * (1 - watchTimer / 3);
                progress.style.strokeDashoffset = offset;
                
                if (watchTimer > 0) {
                    watchTimer--;
                    setTimeout(tick, 1000);
                } else {
                    document.getElementById('watch-overlay').classList.add('hidden');
                    canRate = true;
                    document.querySelectorAll('.rating-btn').forEach(btn => btn.disabled = false);
                }
            }
            
            tick();
        }

        // User Popup
        const users = [
            { name: 'Valentina F.', location: 'Phoenix', earnings: '$+14.42' },
            { name: 'Marcus D.', location: 'Los Angeles', earnings: '$+18.90' },
            { name: 'Sofia M.', location: 'Miami', earnings: '$+12.35' },
            { name: 'Lucas R.', location: 'New York', earnings: '$+21.50' },
            { name: 'Emma W.', location: 'Chicago', earnings: '$+16.80' },
            { name: 'Noah S.', location: 'Houston', earnings: '$+19.25' }
        ];

        function showUserPopup() {
            const user = users[Math.floor(Math.random() * users.length)];
            const popup = document.getElementById('user-popup');
            document.getElementById('popup-name').textContent = user.name;
            document.getElementById('popup-location').textContent = user.location;
            document.getElementById('popup-earnings').textContent = user.earnings;
            
            popup.classList.add('show');
            playNotificationSound();
            
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }

        // Rating Handler
        function handleRating(rating) {
            if (!canRate) return;

            const earnings = (Math.random() * 10 + 10).toFixed(2);
            balance += parseFloat(earnings);
            document.getElementById('balance').textContent = `$${balance.toFixed(2)}`;
            document.getElementById('reward-amount').textContent = `+$${earnings}`;
            
            // Show reward modal
            document.getElementById('reward-modal').classList.add('show');
            triggerConfetti();
            
            setTimeout(() => {
                document.getElementById('reward-modal').classList.remove('show');
                
                if (currentRating < totalRatings) {
                    currentRating++;
                    document.getElementById('current-rating').textContent = currentRating;
                    document.getElementById('progress-fill').style.width = `${(currentRating - 1) / totalRatings * 100}%`;
                    startWatchTimer();
                } else {
                    document.getElementById('progress-fill').style.width = '100%';
                    document.getElementById('continue-btn').classList.add('show');
                    document.querySelectorAll('.rating-btn').forEach(btn => btn.disabled = true);
                }
            }, 3000);
        }

        // Event Listeners
        document.querySelectorAll('.rating-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                handleRating(btn.dataset.rating);
            });
        });

        document.getElementById('continue-btn').addEventListener('click', () => {
            window.location.href = 'roulette.html';
        });

        document.getElementById('reward-modal').addEventListener('click', () => {
            document.getElementById('reward-modal').classList.remove('show');
        });

        // Initialize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        document.body.addEventListener('click', initAudio, { once: true });

        // Start everything
        updateMainTimer();
        startWatchTimer();
        
        // Random user popups
        setInterval(showUserPopup, 8000);
        setTimeout(showUserPopup, 3000);

        // Store balance for next page
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('tiktok-balance', balance);
        });
    </script>
</body>
</html>
